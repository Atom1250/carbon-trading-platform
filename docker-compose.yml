services:
  postgres:
    image: postgres:14-alpine
    container_name: carbon_postgres
    environment:
      POSTGRES_DB: carbon_trading
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platform_user -d carbon_trading']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carbon_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  hardhat:
    image: node:18-alpine
    container_name: carbon_hardhat
    working_dir: /app
    volumes:
      - ./contracts:/app
    ports:
      - '8545:8545'
    command: sh -c "npm install --quiet && npx hardhat node --hostname 0.0.0.0"
    profiles:
      - blockchain

volumes:
  postgres_data:
  redis_data:
