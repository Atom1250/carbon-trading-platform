x-app-env: &app-env
  NODE_ENV: development
  LOG_LEVEL: info
  DATABASE_URL: postgresql://platform_user:dev_password@postgres:5432/carbon_trading
  DATABASE_POOL_MAX: 20
  REDIS_URL: redis://redis:6379
  JWT_ACCESS_SECRET: replace-with-strong-secret-min-32-characters
  JWT_REFRESH_SECRET: replace-with-different-strong-secret-32-chars
  JWT_ACCESS_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  CORS_ORIGINS: http://localhost:${WEB_HOST_PORT:-3000},http://web-app:3000

services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: carbon_trading
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platform_user -d carbon_trading']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  uat-setup:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      <<: *app-env
      ADMIN_EMAIL: admin@uat.local
      ADMIN_PASSWORD: AdminPass123!
      ADMIN_INSTITUTION_ID: 10000000-0000-4000-8000-000000000001
      ADMIN_INSTITUTION_NAME: UAT Test Institution
      ADMIN_COUNTRY_CODE: US
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx node-pg-migrate -m libs/database/migrations --no-check-order up
      && npx tsx scripts/seed-admin-account.ts"
    restart: 'no'

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      <<: *app-env
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      uat-setup:
        condition: service_completed_successfully
    command: ['npx', 'tsx', 'apps/auth-service/src/server.ts']
    ports:
      - '${AUTH_HOST_PORT:-3002}:3002'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  institution-service:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      <<: *app-env
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      uat-setup:
        condition: service_completed_successfully
    command: ['npx', 'tsx', 'apps/institution-service/src/server.ts']
    ports:
      - '${INSTITUTION_HOST_PORT:-3003}:3003'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3003/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  asset-service:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      <<: *app-env
      PORT: 3004
      BLOCKCHAIN_RPC_URL: ''
      BLOCKCHAIN_PRIVATE_KEY: ''
      BLOCKCHAIN_CONTRACT_ADDRESS: ''
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      uat-setup:
        condition: service_completed_successfully
    command: ['npx', 'tsx', 'apps/asset-service/src/server.ts']
    ports:
      - '${ASSET_HOST_PORT:-3004}:3004'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3004/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  compliance-service:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      <<: *app-env
      PORT: 3005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      uat-setup:
        condition: service_completed_successfully
    command: ['npx', 'tsx', 'apps/compliance-service/src/server.ts']
    ports:
      - '${COMPLIANCE_HOST_PORT:-3005}:3005'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3005/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  trading-service:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      <<: *app-env
      PORT: 3006
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      uat-setup:
        condition: service_completed_successfully
    command: ['npx', 'tsx', 'apps/trading-service/src/server.ts']
    ports:
      - '${TRADING_HOST_PORT:-3006}:3006'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3006/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  ledger-service:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      <<: *app-env
      PORT: 3007
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      uat-setup:
        condition: service_completed_successfully
    command: ['npx', 'tsx', 'apps/ledger-service/src/server.ts']
    ports:
      - '${LEDGER_HOST_PORT:-3007}:3007'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3007/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      <<: *app-env
      PORT: 3001
      AUTH_SERVICE_URL: http://auth-service:3002
      INSTITUTION_SERVICE_URL: http://institution-service:3003
      ASSET_SERVICE_URL: http://asset-service:3004
      COMPLIANCE_SERVICE_URL: http://compliance-service:3005
      TRADING_SERVICE_URL: http://trading-service:3006
      LEDGER_SERVICE_URL: http://ledger-service:3007
    depends_on:
      auth-service:
        condition: service_healthy
      institution-service:
        condition: service_healthy
      asset-service:
        condition: service_healthy
      compliance-service:
        condition: service_healthy
      trading-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    command: ['npx', 'tsx', 'apps/api-gateway/src/server.ts']
    ports:
      - '${API_GATEWAY_HOST_PORT:-3001}:3001'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  web-app:
    build:
      context: .
      dockerfile: Dockerfile.uat
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_GATEWAY_HOST_PORT:-3001}
    depends_on:
      api-gateway:
        condition: service_healthy
    command: ['sh', '-c', 'cd apps/web-app && npx next dev -H 0.0.0.0 -p 3000']
    ports:
      - '${WEB_HOST_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8

  hardhat:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./contracts:/app
    ports:
      - '${HARDHAT_HOST_PORT:-8545}:8545'
    command: sh -c "npm install --quiet --legacy-peer-deps && npx hardhat node --hostname 0.0.0.0"
    profiles:
      - blockchain

volumes:
  postgres_data:
  redis_data:
