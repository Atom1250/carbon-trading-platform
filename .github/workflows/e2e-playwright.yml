name: E2E Playwright

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run service test gate
        run: |
          npm run guard:web-middleware
          npx nx test @carbon-trading-platform/web-app
          npx nx test @carbon-trading-platform/ledger-service
          npx nx test @carbon-trading-platform/trading-service

      - name: Run portal route smoke tests
        run: npx playwright test --config apps/carbon-trading-platform-e2e/playwright.config.ts apps/carbon-trading-platform-e2e/tests/portal-routing.spec.ts

      - name: Run Playwright e2e suite
        run: npx nx run @carbon-trading-platform/carbon-trading-platform-e2e:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-output/playwright-report

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-output/playwright-results/results.xml
